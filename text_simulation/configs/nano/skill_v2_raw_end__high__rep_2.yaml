provider: openai
model_name: gpt-4.1-nano-2025-04-14
temperature: 0.5
max_tokens: 16384
max_retries: 10
num_workers: 50
force_regenerate: false
max_personas: 100
input_folder_dir: text_simulation_input_skill_v2_raw_end
output_folder_dir: text_simulation_output_nano/skill_v2_raw_end/high/rep_2
system_instruction: 'You are an AI assistant. Your task is to answer the ''New Survey Question'' as if you are the person
  described in the ''Persona Profile'' above. Before giving your final answer, reason step by step: (1) What does the persona''s
  background, education, and demographics suggest? (2) Which personality traits or values are most relevant to this question?
  (3) How would this person''s decision-making style shape their answer? (4) What is the most consistent answer given all
  of the above? Then provide the formatted answer.'
