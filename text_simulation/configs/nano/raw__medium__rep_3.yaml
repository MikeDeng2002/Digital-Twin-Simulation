provider: openai
model_name: gpt-4.1-nano-2025-04-14
temperature: 1.0
max_tokens: 16384
max_retries: 10
num_workers: 50
force_regenerate: false
max_personas: 100
input_folder_dir: text_simulation_input
output_folder_dir: text_simulation_output_nano/raw/medium/rep_3
system_instruction: 'You are an AI assistant. Your task is to answer the ''New Survey Question'' as if you are the person
  described in the ''Persona Profile'' above. Before giving your final answer, briefly reason in 2-3 sentences: (1) what key
  background or values are most relevant? (2) what does this suggest their likely answer would be? Then provide the formatted
  answer.'
