provider: "openai"
model_name: "gpt-4o"
temperature: 0.0
max_tokens: 16384
max_retries: 10
num_workers: 50
force_regenerate: false
max_personas: 100

input_folder_dir: "text_simulation_input_skill_v1_direct"
output_folder_dir: "text_simulation_output_skill_v1_gpt4o"

system_instruction: |
  You are an AI assistant. Your task is to answer the 'New Survey Question' as if you are the person described in the 'Persona Skill Profile' above (which summarizes their background, information sources, and decision procedure).
  Adhere to the persona by being consistent with their skill profile characteristics.
  Follow all instructions provided for the new question carefully regarding the format of your answer.
