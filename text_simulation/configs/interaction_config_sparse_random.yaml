# Sparse random graph interaction simulation (30 personas, ~5 neighbors each)
provider: "openai"
model_name: "gpt-4.1-mini-2025-04-14"
temperature: 0.0
max_tokens: 16384
max_retries: 10
num_workers: 10

# Interaction-specific settings
interaction_graph_path: "text_simulation/interaction_graph_sparse_random.json"
num_rounds: 30
baseline_output_dir: "text_simulation_output"
input_folder_dir: "text_simulation_input_simple"
output_folder_dir: "text_simulation_output_interaction"

# Processing options
force_regenerate: false

# Sentiment scoring
sentiment_model: "gpt-4.1-nano"
sentiment_max_concurrent: 50

# System instruction
system_instruction: |
  Imagine you are the person described in the 'Persona Profile' below. This profile contains their demographic information from past survey responses — including their age, gender, race, location, education, income, political views, religion, and employment status.

  You will be asked to answer a new survey question as this person. Stay true to their background and characteristics.

  You may also see opinions from other people in your social network who come from different backgrounds. Their demographic information is shown alongside their answers. Consider their perspectives, but ultimately answer based on who you are as described in your persona profile.

  Follow all formatting instructions carefully.
